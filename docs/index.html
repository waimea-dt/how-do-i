    <script>
        window.$docsify = {
            name: 'DT Notes',
            logo: '/_assets/macs/macintosh-happy.svg',

            coverpage: true,
            onlyCover: true,

            loadSidebar: true,

    </script>

            theme: 'dark',
            themeVariables: {
                fontSize: '18px',
                fontFamily: 'system-ui, sans-serif'
            }
        });
        window.mermaid = mermaid;
    </script>
