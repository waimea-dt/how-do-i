    <div id="app">Please wait...</div>

    <script>
        window.$docsify = {
            name: 'DT Notes',
            logo: '/_assets/macs/macintosh-happy.svg',
            homepage: 'index.md',

            coverpage: true,
            onlyCover: true,

            loadSidebar: true,
            sidebarDisplayLevel: 1,
            subMaxLevel: 2,

            auto2top: true,

            lucide: {
                size: 18,
                color: 'currentColor',
                strokeWidth: 2,
                class: 'inline-icon'
            },
        }
    </script>

    <script type="module">
        import mermaid from "https://unpkg.com/mermaid@11.0.2/dist/mermaid.esm.min.mjs";
        mermaid.initialize({
            startOnLoad: true,
            theme: 'dark',
            themeVariables: {
                fontSize: '18px',
                fontFamily: 'system-ui, sans-serif'
            }
        });
        window.mermaid = mermaid;
    </script>
